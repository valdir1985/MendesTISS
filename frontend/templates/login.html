<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MendesTiss</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h2>MendesTiss</h2>
        <form id="login-form">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-control" required placeholder="seu@email.com">
            
            <label for="password">Senha</label>
            <input type="password" id="password" class="form-control" required placeholder="Sua senha">
            
            <div id="login-error" style="color: red; margin-bottom: 15px; display: none; text-align: center;"></div>
            
            <button type="submit" class="btn-primary" style="width: 100%;">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Impede o recarregamento da página
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            // O OAuth2PasswordRequestForm do FastAPI exige envio como form-urlencoded
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Guarda o token no navegador
                    localStorage.setItem('access_token', data.access_token);
                    // Redireciona para o dashboard (vamos criar essa página na próxima etapa)
                    window.location.href = '/dashboard';
                } else {
                    const errorData = await response.json();
                    errorDiv.innerText = errorData.detail || "Erro ao fazer login.";
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = "Erro de conexão com o servidor.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
